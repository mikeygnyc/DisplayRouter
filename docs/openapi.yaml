openapi: 3.0.3
info:
  title: Display Router API
  version: 0.1.0
  description: |
    Authentication:
    - Client API uses X-API-Key per client.
    - Admin API uses Authorization: Bearer <ADMIN_TOKEN>.
    - Display server uses X-Display-Secret for /display/health and /display/ws.
servers:
  - url: https://router.example.com
security:
  - ClientApiKey: []
  - AdminBearerAuth: []
paths:
  /api/clients:
    post:
      summary: Register client
      tags: [client-admin]
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreate'
      responses:
        '200':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientCreated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/clients/{client_id}:
    get:
      summary: Get client
      tags: [client-admin]
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/clients/{client_id}/payload-types:
    get:
      summary: List client payload types
      tags: [client]
      security:
        - ClientApiKey: []
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Payload types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayloadTypeList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/payloads:
    post:
      summary: Submit payload
      tags: [client]
      security:
        - ClientApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayloadSubmit'
      responses:
        '200':
          description: Payload accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayloadAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/templates:
    get:
      summary: List templates
      tags: [client]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      security:
        - ClientApiKey: []
        - AdminBearerAuth: []
      responses:
        '200':
          description: Templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/clients:
    get:
      summary: List clients
      tags: [admin]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Clients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/clients/{client_id}:
    put:
      summary: Update client
      tags: [admin]
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientUpdate'
      responses:
        '200':
          description: Client updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Disable client
      tags: [admin]
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Client disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/templates:
    get:
      summary: List templates (admin)
      tags: [admin]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Create template
      tags: [admin]
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateCreate'
      responses:
        '200':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/templates/{template_id}:
    put:
      summary: Update template
      tags: [admin]
      security:
        - AdminBearerAuth: []
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateUpdate'
      responses:
        '200':
          description: Template updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete template
      tags: [admin]
      security:
        - AdminBearerAuth: []
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Template deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/rules:
    get:
      summary: List rules
      tags: [admin]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Create rule
      tags: [admin]
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleCreate'
      responses:
        '200':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/rules/{rule_id}:
    put:
      summary: Update rule
      tags: [admin]
      security:
        - AdminBearerAuth: []
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleUpdate'
      responses:
        '200':
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete rule
      tags: [admin]
      security:
        - AdminBearerAuth: []
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rule deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/displays:
    get:
      summary: List display targets
      tags: [admin]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Displays
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisplayTargetList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Create display target
      tags: [admin]
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisplayTargetCreate'
      responses:
        '200':
          description: Display created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisplayTarget'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/displays/{display_id}:
    put:
      summary: Update display target
      tags: [admin]
      security:
        - AdminBearerAuth: []
      parameters:
        - name: display_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisplayTargetUpdate'
      responses:
        '200':
          description: Display updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisplayTarget'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Disable display target
      tags: [admin]
      security:
        - AdminBearerAuth: []
      parameters:
        - name: display_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Display disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisplayTarget'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/logs:
    get:
      summary: List log events
      tags: [admin]
      parameters:
        - name: level
          in: query
          required: false
          schema:
            type: string
        - name: client_id
          in: query
          required: false
          schema:
            type: string
        - name: display_id
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogEventList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/logs/{log_id}:
    get:
      summary: Get log event
      tags: [admin]
      security:
        - AdminBearerAuth: []
      parameters:
        - name: log_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Log event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogEventOut'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/logs/{log_id}/replay:
    post:
      summary: Replay payload from log
      tags: [admin]
      security:
        - AdminBearerAuth: []
      parameters:
        - name: log_id
          in: path
          required: true
          schema:
            type: string
        - name: dry_run
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Log event replayed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplayResult'
        '409':
          $ref: '#/components/responses/Conflict'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/monitoring:
    get:
      summary: Monitoring summary
      tags: [admin]
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Monitoring summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoringSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/broadcasts/text:
    post:
      summary: Broadcast text to displays
      tags: [admin]
      security:
        - AdminBearerAuth: []
      parameters:
        - name: text
          in: query
          required: true
          schema:
            type: string
        - name: display_ids
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
        - name: all_displays
          in: query
          required: false
          schema:
            type: boolean
            default: true
        - name: color
          in: query
          required: false
          schema:
            type: string
            default: "#ffffff"
        - name: scroll_ms_per_px
          in: query
          required: false
          schema:
            type: integer
            default: 15
        - name: duration_seconds
          in: query
          required: false
          schema:
            type: integer
            default: 30
        - name: transition
          in: query
          required: false
          schema:
            type: string
            default: slide
      responses:
        '200':
          description: Broadcast accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  payload_id:
                    type: string
                  display_ids:
                    type: array
                    items:
                      type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/broadcasts/commands:
    post:
      summary: Broadcast rgbmatrix command stream
      tags: [admin]
      security:
        - AdminBearerAuth: []
      parameters:
        - name: display_ids
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
        - name: all_displays
          in: query
          required: false
          schema:
            type: boolean
            default: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
      responses:
        '200':
          description: Broadcast accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  payload_id:
                    type: string
                  display_ids:
                    type: array
                    items:
                      type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /display/health:
    get:
      summary: Display server health check
      tags: [display]
      security:
        - DisplaySecret: []
      responses:
        '200':
          description: Health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisplayHealth'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    ClientApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Client API key returned from /api/clients and sent as X-API-Key.
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
      description: Admin bearer token configured via ADMIN_TOKEN.
    DisplaySecret:
      type: apiKey
      in: header
      name: X-Display-Secret
      description: Shared display secret configured via DISPLAY_SECRET.
  parameters:
    ClientId:
      name: client_id
      in: path
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            invalid_request:
              summary: Invalid request
              value:
                error: bad_request
                message: Missing required field
                details:
                  field: name
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            missing_auth:
              summary: Missing or invalid auth
              value:
                error: unauthorized
                message: Invalid or missing credentials
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            not_allowed:
              summary: Not allowed
              value:
                error: forbidden
                message: You do not have access to this resource
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            not_found:
              summary: Resource not found
              value:
                error: not_found
                message: Client not found
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
          examples:
            validation_error:
              summary: Validation failed
              value:
                error: validation_error
                message: Invalid payload
                details:
                  errors:
                    - field: payload_type
                      message: must be a non-empty string
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
    ValidationError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
    Envelope:
      type: object
      properties:
        data:
          type: object
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    ResponseMeta:
      type: object
      properties:
        request_id:
          type: string
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        next_page:
          type: integer
        prev_page:
          type: integer
    ClientCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        contact:
          type: string
        payload_types:
          type: array
          items:
            type: string
    ClientCreated:
      type: object
      properties:
        id:
          type: string
        api_key:
          type: string
        created_at:
          type: string
          format: date-time
      example:
        id: cli_123
        api_key: sk_live_xxx
        created_at: '2026-03-22T12:00:00Z'
    Client:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        contact:
          type: string
        payload_types:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        disabled:
          type: boolean
    ClientUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        contact:
          type: string
        payload_types:
          type: array
          items:
            type: string
        disabled:
          type: boolean
      example:
        id: cli_123
        name: WeatherBot
        description: Local weather producer
        contact: ops@example.com
        payload_types: [weather.summary]
        created_at: '2026-03-22T12:00:00Z'
        disabled: false
    PayloadSubmit:
      type: object
      required: [client_id, payload_type, data]
      properties:
        client_id:
          type: string
        payload_type:
          type: string
        template_id:
          type: string
        format_hint:
          type: string
        priority:
          type: integer
        ttl_seconds:
          type: integer
        data:
          type: object
      example:
        client_id: cli_123
        payload_type: weather.summary
        template_id: tpl_abc
        format_hint: compact
        priority: 5
        ttl_seconds: 120
        data:
          temp_f: 72
          condition: Sunny
    PayloadAccepted:
      type: object
      properties:
        payload_id:
          type: string
        routed_displays:
          type: array
          items:
            type: string
        status:
          type: string
      example:
        payload_id: pld_789
        routed_displays: [disp_main]
        status: accepted
    TemplateCreate:
      type: object
      required: [name, payload_type, template]
      properties:
        name:
          type: string
        description:
          type: string
        payload_type:
          type: string
        template:
          type: string
        default_style:
          type: object
      example:
        name: Weather Compact
        description: Single line weather summary
        payload_type: weather.summary
        template: '{{temp_f}}F {{condition}}'
        default_style:
          color: '#FFFFFF'
    Template:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        payload_type:
          type: string
        template:
          type: string
        default_style:
          type: object
        created_at:
