openapi: 3.0.3
info:
  title: Display Router API
  version: 0.1.0
servers:
  - url: https://router.example.com
security:
  - ClientApiKey: []
  - AdminBearerAuth: []
paths:
  /api/clients:
    post:
      summary: Register client
      tags: [client-admin]
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreate'
      responses:
        '200':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientCreated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/clients/{client_id}:
    get:
      summary: Get client
      tags: [client-admin]
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/clients/{client_id}/payload-types:
    get:
      summary: List client payload types
      tags: [client]
      security:
        - ClientApiKey: []
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Payload types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayloadTypeList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/payloads:
    post:
      summary: Submit payload
      tags: [client]
      security:
        - ClientApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayloadSubmit'
      responses:
        '200':
          description: Payload accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayloadAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/templates:
    get:
      summary: List templates
      tags: [client]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      security:
        - ClientApiKey: []
        - AdminBearerAuth: []
      responses:
        '200':
          description: Templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/clients:
    get:
      summary: List clients
      tags: [admin]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Clients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/templates:
    post:
      summary: Create template
      tags: [admin]
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateCreate'
      responses:
        '200':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/rules:
    post:
      summary: Create rule
      tags: [admin]
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleCreate'
      responses:
        '200':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/displays:
    get:
      summary: List display targets
      tags: [admin]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Displays
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisplayTargetList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Create display target
      tags: [admin]
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisplayTargetCreate'
      responses:
        '200':
          description: Display created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisplayTarget'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /display/health:
    get:
      summary: Display server health check
      tags: [display]
      security:
        - DisplaySecret: []
      responses:
        '200':
          description: Health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisplayHealth'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    ClientApiKey:
      type: apiKey
      in: header
      name: X-API-Key
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    DisplaySecret:
      type: apiKey
      in: header
      name: X-Display-Secret
  parameters:
    ClientId:
      name: client_id
      in: path
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            invalid_request:
              summary: Invalid request
              value:
                error: bad_request
                message: Missing required field
                details:
                  field: name
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            missing_auth:
              summary: Missing or invalid auth
              value:
                error: unauthorized
                message: Invalid or missing credentials
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            not_allowed:
              summary: Not allowed
              value:
                error: forbidden
                message: You do not have access to this resource
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            not_found:
              summary: Resource not found
              value:
                error: not_found
                message: Client not found
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
          examples:
            validation_error:
              summary: Validation failed
              value:
                error: validation_error
                message: Invalid payload
                details:
                  errors:
                    - field: payload_type
                      message: must be a non-empty string
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
    ValidationError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
    Envelope:
      type: object
      properties:
        data:
          type: object
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    ResponseMeta:
      type: object
      properties:
        request_id:
          type: string
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        next_page:
          type: integer
        prev_page:
          type: integer
    ClientCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        contact:
          type: string
        payload_types:
          type: array
          items:
            type: string
    ClientCreated:
      type: object
      properties:
        id:
          type: string
        api_key:
          type: string
        created_at:
          type: string
          format: date-time
      example:
        id: cli_123
        api_key: sk_live_xxx
        created_at: '2026-03-22T12:00:00Z'
    Client:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        contact:
          type: string
        payload_types:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        disabled:
          type: boolean
      example:
        id: cli_123
        name: WeatherBot
        description: Local weather producer
        contact: ops@example.com
        payload_types: [weather.summary]
        created_at: '2026-03-22T12:00:00Z'
        disabled: false
    PayloadSubmit:
      type: object
      required: [client_id, payload_type, data]
      properties:
        client_id:
          type: string
        payload_type:
          type: string
        template_id:
          type: string
        format_hint:
          type: string
        priority:
          type: integer
        ttl_seconds:
          type: integer
        data:
          type: object
      example:
        client_id: cli_123
        payload_type: weather.summary
        template_id: tpl_abc
        format_hint: compact
        priority: 5
        ttl_seconds: 120
        data:
          temp_f: 72
          condition: Sunny
    PayloadAccepted:
      type: object
      properties:
        payload_id:
          type: string
        routed_displays:
          type: array
          items:
            type: string
        status:
          type: string
      example:
        payload_id: pld_789
        routed_displays: [disp_main]
        status: accepted
    TemplateCreate:
      type: object
      required: [name, payload_type, template]
      properties:
        name:
          type: string
        description:
          type: string
        payload_type:
          type: string
        template:
          type: string
        default_style:
          type: object
      example:
        name: Weather Compact
        description: Single line weather summary
        payload_type: weather.summary
        template: '{{temp_f}}F {{condition}}'
        default_style:
          color: '#FFFFFF'
    Template:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        payload_type:
          type: string
        template:
          type: string
        default_style:
          type: object
        created_at:
          type: string
          format: date-time
      example:
        id: tpl_abc
        name: Weather Compact
        description: Single line weather summary
        payload_type: weather.summary
        template: '{{temp_f}}F {{condition}}'
        default_style:
          color: '#FFFFFF'
        created_at: '2026-03-22T12:00:00Z'
    RuleCreate:
      type: object
      required: [name, priority, display_targets]
      properties:
        name:
          type: string
        match:
          type: object
          properties:
            client_id:
              type: string
            payload_type:
              type: string
            tags:
              type: array
              items:
                type: string
        priority:
          type: integer
        display_targets:
          type: array
          items:
            type: string
        transition:
          type: string
        cooldown_seconds:
          type: integer
        schedule:
          type: object
          properties:
            timezone:
              type: string
            days:
              type: array
              items:
                type: string
            start:
              type: string
            end:
              type: string
      example:
        name: Weather Main
        match:
          client_id: cli_123
          payload_type: weather.summary
          tags: [priority]
        priority: 10
        display_targets: [disp_main]
        transition: fade
        cooldown_seconds: 30
        schedule:
          timezone: America/Chicago
          days: [mon,tue,wed,thu,fri,sat,sun]
          start: '06:00'
          end: '22:00'
    Rule:
      allOf:
        - $ref: '#/components/schemas/RuleCreate'
        - type: object
          properties:
            id:
              type: string
            enabled:
              type: boolean
      example:
        id: rule_001
        name: Weather Main
        match:
          client_id: cli_123
          payload_type: weather.summary
          tags: [priority]
        priority: 10
        display_targets: [disp_main]
        transition: fade
        cooldown_seconds: 30
        schedule:
          timezone: America/Chicago
          days: [mon,tue,wed,thu,fri,sat,sun]
          start: '06:00'
          end: '22:00'
        enabled: true
    DisplayTargetCreate:
      type: object
      required: [name, host, port]
      properties:
        name:
          type: string
        host:
          type: string
        port:
          type: integer
        capabilities:
          type: object
      example:
        name: Main Lobby
        host: 10.0.0.15
        port: 8081
        capabilities:
          width: 64
          height: 32
          color_depth: 24
    DisplayTarget:
      allOf:
        - $ref: '#/components/schemas/DisplayTargetCreate'
        - type: object
          properties:
            id:
              type: string
            created_at:
              type: string
              format: date-time
            disabled:
              type: boolean
      example:
        id: disp_main
        name: Main Lobby
        host: 10.0.0.15
        port: 8081
        capabilities:
          width: 64
          height: 32
          color_depth: 24
        created_at: '2026-03-22T12:00:00Z'
        disabled: false
    DisplayHealth:
      type: object
      properties:
        status:
          type: string
        uptime_seconds:
          type: integer
      example:
        status: ok
        uptime_seconds: 12345
    ClientList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Client'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    TemplateList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Template'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    DisplayTargetList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DisplayTarget'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    PayloadTypeList:
      type: object
      properties:
        data:
          type: array
          items:
            type: string
        meta:
          $ref: '#/components/schemas/ResponseMeta'
x-websocket:
  /display/ws:
    summary: Display server WebSocket
    description: Display servers connect and receive display_payload messages; they send heartbeat messages.
    messages:
      display_payload:
        payload:
          type: object
          properties:
            type:
              type: string
              enum: [display_payload]
            display_id:
              type: string
            payload_id:
              type: string
            render:
              type: object
              properties:
                template:
                  type: string
                resolved:
                  type: object
                style:
                  type: object
            transition:
              type: object
              properties:
                type:
                  type: string
                duration_ms:
                  type: integer
            expires_at:
              type: string
              format: date-time
      heartbeat:
        payload:
          type: object
          properties:
            type:
              type: string
              enum: [heartbeat]
            display_id:
              type: string
            uptime_seconds:
              type: integer
