  /display/ws:
    summary: Display server WebSocket
    description: Display servers connect and receive display_payload messages; they send heartbeat messages.
    messages:
      display_payload:
        payload:
          type: object
          properties:
            type:
              type: string
              enum: [display_payload]
            display_id:
              type: string
            payload_id:
              type: string
            render:
              type: object
              properties:
                template:
                  type: string
                resolved:
                  type: object
                style:
                  type: object
            transition:
              type: object
              properties:
                type:
                  type: string
                duration_ms:
                  type: integer
            expires_at:
              type: string
              format: date-time
      heartbeat:
        payload:
          type: object
          properties:
            type:
              type: string
              enum: [heartbeat]
            display_id:
              type: string
            uptime_seconds:
              type: integer
