asyncapi: 2.6.0
id: urn:display-router:ws
defaultContentType: application/json
tags:
  - name: display
    description: Display server connections and payloads
  - name: router
    description: Router-originated events
info:
  title: Display Router WebSocket API
  version: 0.1.0
  description: WebSocket contract between router and display servers.
  contact:
    name: Display Router Team
  license:
    name: MIT
servers:
  router:
    url: wss://router.example.com/display/ws
    protocol: wss
    description: Display servers connect to router WebSocket
channels:
  /display/ws:
    subscribe:
      summary: Router sends display payloads to display servers
      operationId: receiveDisplayPayload
      security:
        - DisplaySecret: []
      message:
        $ref: '#/components/messages/DisplayPayload'
    publish:
      summary: Display server sends heartbeat to router (interval configurable)
      operationId: sendHeartbeat
      security:
        - DisplaySecret: []
      message:
        $ref: '#/components/messages/Heartbeat'
components:
  securitySchemes:
    DisplaySecret:
      type: http
      scheme: bearer
      description: Provide X-Display-Secret as a bearer token value.
  messages:
    DisplayPayload:
      messageId: display_payload
      name: display_payload
      payload:
        type: object
        properties:
          type:
            type: string
            enum: [display_payload]
          display_id:
            type: string
          payload_id:
            type: string
          render:
            type: object
            properties:
              template:
                type: string
              resolved:
                type: object
              style:
                type: object
          transition:
            type: object
            properties:
              type:
                type: string
              duration_ms:
                type: integer
          expires_at:
            type: string
            format: date-time
      examples:
        - payload:
            type: display_payload
            display_id: disp_main
            payload_id: pld_789
            render:
              template: '{{temp_f}}F {{condition}}'
              resolved:
                temp_f: 72
                condition: Sunny
              style:
                color: '#FFFFFF'
            transition:
              type: fade
              duration_ms: 500
            expires_at: '2026-03-22T12:02:00Z'
    Heartbeat:
      messageId: heartbeat
      name: heartbeat
      payload:
        type: object
        properties:
          type:
            type: string
            enum: [heartbeat]
          display_id:
            type: string
          uptime_seconds:
            type: integer
      examples:
        - payload:
            type: heartbeat
            display_id: disp_main
            uptime_seconds: 12345
