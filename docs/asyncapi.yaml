asyncapi: 2.6.0
info:
  title: Display Router WebSocket API
  version: 0.1.0
servers:
  router:
    url: wss://router.example.com/display/ws
    protocol: wss
    description: Display servers connect to router WebSocket
channels:
  /display/ws:
    subscribe:
      summary: Router sends display payloads to display servers
      message:
        $ref: '#/components/messages/DisplayPayload'
    publish:
      summary: Display server sends heartbeat to router (interval configurable)
      message:
        $ref: '#/components/messages/Heartbeat'
components:
  securitySchemes:
    DisplaySecret:
      type: apiKey
      in: header
      name: X-Display-Secret
  messages:
    DisplayPayload:
      name: display_payload
      payload:
        type: object
        properties:
          type:
            type: string
            enum: [display_payload]
          display_id:
            type: string
          payload_id:
            type: string
          render:
            type: object
            properties:
              template:
                type: string
              resolved:
                type: object
              style:
                type: object
          transition:
            type: object
            properties:
              type:
                type: string
              duration_ms:
                type: integer
            expires_at:
              type: string
              format: date-time
      examples:
        - payload:
            type: display_payload
            display_id: disp_main
            payload_id: pld_789
            render:
              template: '{{temp_f}}F {{condition}}'
              resolved:
                temp_f: 72
                condition: Sunny
              style:
                color: '#FFFFFF'
            transition:
              type: fade
              duration_ms: 500
            expires_at: '2026-03-22T12:02:00Z'
    Heartbeat:
      name: heartbeat
      payload:
        type: object
        properties:
          type:
            type: string
            enum: [heartbeat]
          display_id:
            type: string
            uptime_seconds:
              type: integer
      examples:
        - payload:
            type: heartbeat
            display_id: disp_main
            uptime_seconds: 12345
security:
  - DisplaySecret: []
