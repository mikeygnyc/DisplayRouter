services:
  router:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      AUTO_GENERATE_ADMIN_TOKEN: "1"
      ADMIN_TOKEN: dev-admin-token
      DISPLAY_SECRET: dev-display-secret
      API_KEY_SALT: dev-salt
      DATABASE_URL: sqlite:////app/data/display_router.db
      ROUTER_CONFIG_FILE: /app/local_config/router.json
      SIM_SERVER_URL: http://display:8082
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
      - ./local_config:/app/local_config
    command: ["sh", "scripts/with_local_config.sh", "uvicorn", "router.main:app", "--host", "0.0.0.0", "--port", "8000"]

  display:
    build: .
    depends_on:
      - router
    environment:
      DISPLAY_CONFIG_FILE: /app/local_config/display.json
      DISPLAY_RENDERER: sim
      ROUTER_WS_URL: ws://router:8000/display/ws
    volumes:
      - ./config:/app/config:ro
      - ./local_config:/app/local_config
    ports:
      - "8082:8082"
      - "8083:8083"
      - "8084:8084"
    command: ["sh", "scripts/with_local_config.sh", "sh", "scripts/run_display_sim.sh"]

  admin-ui:
    build: .
    depends_on:
      - router
    ports:
      - "8081:8081"
    environment:
      ADMIN_TOKEN: dev-admin-token
      DATABASE_URL: sqlite:////app/data/display_router.db
      ROUTER_CONFIG_FILE: /app/local_config/router.json
      ROUTER_HTTP_URL: http://router:8000
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./local_config:/app/local_config
    command: ["sh", "scripts/with_local_config.sh", "uvicorn", "admin.main:app", "--host", "0.0.0.0", "--port", "8081"]
