<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Display Router Admin</title>
    <style>
      body {
        font-family: "Space Grotesk", system-ui, sans-serif;
        margin: 0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: #f4efe6;
        color: #1f1a16;
      }
      .card {
        background: #fff;
        border: 1px solid rgba(31, 26, 22, 0.1);
        padding: 32px;
        border-radius: 20px;
        max-width: 560px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(31, 26, 22, 0.15);
      }
      a {
        display: inline-block;
        margin-top: 16px;
        text-decoration: none;
        padding: 10px 16px;
        border-radius: 999px;
        background: #1f1a16;
        color: #f4efe6;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Admin UI moved</h1>
      <p>The new Admin UI is now served at <strong>/ui</strong>.</p>
      <a href="/ui">Open Admin UI</a>
    </div>
  </body>
</html>
